groups:
    - name: atlas-recording-rules
      interval: 30s
      rules:
          - record: atlas:http_request_rate_1m
            expr: sum by (application, method, route) (rate(atlas_http_server_requests_total[1m]))

          - record: atlas:http_request_rate_5m
            expr: sum by (application, method, route, status) (rate(atlas_http_server_requests_total[5m]))

          - record: atlas:http_error_rate_5m
            expr: |
                sum by (application) (rate(atlas_http_server_requests_total{status=~"5.."}[5m]))
                /
                clamp_min(sum by (application) (rate(atlas_http_server_requests_total[5m])), 0.001)

          - record: atlas:http_p50_latency_5m
            expr: |
                histogram_quantile(
                  0.50,
                  sum by (application, le) (rate(atlas_http_server_request_duration_seconds_bucket[5m]))
                )

          - record: atlas:http_p95_latency_5m
            expr: |
                histogram_quantile(
                  0.95,
                  sum by (application, le) (rate(atlas_http_server_request_duration_seconds_bucket[5m]))
                )

          - record: atlas:http_p99_latency_5m
            expr: |
                histogram_quantile(
                  0.99,
                  sum by (application, le) (rate(atlas_http_server_request_duration_seconds_bucket[5m]))
                )

          - record: atlas:slow_request_rate_5m
            expr: sum by (application, route) (rate(atlas_http_server_requests_slow_total[5m]))

          - record: atlas:database_ping_latency_avg_5m
            expr: avg_over_time(atlas_infrastructure_ping_latency{dependency="database"}[5m])

          - record: atlas:redis_ping_latency_avg_5m
            expr: avg_over_time(atlas_infrastructure_ping_latency{dependency="redis"}[5m])

          - record: atlas:dependency_failures_5m
            expr: sum by (application, dependency) (increase(atlas_infrastructure_check_failures_total[5m]))

          - record: atlas:dependency_ping_spikes_5m
            expr: sum by (application, dependency) (increase(atlas_infrastructure_ping_spikes_total[5m]))

          - record: atlas:storage_usable_ratio
            expr: atlas_storage_usable_bytes / clamp_min(atlas_storage_total_bytes, 1)

          - record: atlas:jvm_heap_usage_ratio
            expr: |
                sum by (application) (jvm_memory_used_bytes{area="heap"})
                /
                clamp_min(sum by (application) (jvm_memory_max_bytes{area="heap"}), 1)

          - record: atlas:hikaricp_pending_connections_max_5m
            expr: max by (application) (max_over_time(hikaricp_connections_pending[5m]))

    - name: atlas-alert-rules
      interval: 30s
      rules:
          - alert: AtlasInstanceDown
            expr: up{job="atlas-app"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: Atlas instance is down
                description: '{{ $labels.instance }} has been unreachable for more than 2 minutes.'

          - alert: AtlasHighHttpErrorRate
            expr: atlas:http_error_rate_5m > 0.05
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: Atlas 5xx error rate is elevated
                description: '{{ $labels.application }} has a 5xx error rate above 5% for the last 5 minutes.'

          - alert: AtlasHighHttpLatencyP95
            expr: atlas:http_p95_latency_5m > 1
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: Atlas request latency is elevated
                description: '{{ $labels.application }} p95 request latency is above 1 second for the last 10 minutes.'

          - alert: AtlasDatabaseUnavailable
            expr: atlas_infrastructure_status{dependency="database"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: Atlas database probe is failing
                description: The Atlas database probe has been unhealthy for more than 2 minutes.

          - alert: AtlasRedisUnavailable
            expr: atlas_infrastructure_status{dependency="redis"} == 0
            for: 2m
            labels:
                severity: critical
            annotations:
                summary: Atlas Redis probe is failing
                description: The Atlas Redis probe has been unhealthy for more than 2 minutes.

          - alert: AtlasStorageUnavailable
            expr: atlas_storage_status == 0
            for: 5m
            labels:
                severity: warning
            annotations:
                summary: Atlas upload storage is not writable
                description: Atlas upload storage has been degraded or unavailable for more than 5 minutes.

          - alert: AtlasStorageLowCapacity
            expr: atlas:storage_usable_ratio < 0.15
            for: 10m
            labels:
                severity: critical
            annotations:
                summary: Atlas upload storage is running low
                description: Atlas upload storage has less than 15% free space for more than 10 minutes.

          - alert: AtlasDatabasePingSpike
            expr: increase(atlas_infrastructure_ping_spikes_total{dependency="database"}[5m]) > 3
            for: 0m
            labels:
                severity: warning
            annotations:
                summary: Atlas database latency is spiking
                description: Atlas database latency crossed the configured spike threshold more than 3 times in 5 minutes.

          - alert: AtlasRedisPingSpike
            expr: increase(atlas_infrastructure_ping_spikes_total{dependency="redis"}[5m]) > 3
            for: 0m
            labels:
                severity: warning
            annotations:
                summary: Atlas Redis latency is spiking
                description: Atlas Redis latency crossed the configured spike threshold more than 3 times in 5 minutes.

          - alert: AtlasHighJvmHeapUsage
            expr: atlas:jvm_heap_usage_ratio > 0.85
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: Atlas JVM heap pressure is high
                description: '{{ $labels.application }} JVM heap usage has exceeded 85% for more than 10 minutes.'

          - alert: AtlasHikariPoolSaturation
            expr: atlas:hikaricp_pending_connections_max_5m > 5
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: Atlas connection pool is saturated
                description: '{{ $labels.application }} has had more than 5 pending Hikari connections over the last 5 minutes.'

          - alert: AtlasHighSlowRequestRate
            expr: sum by (application) (rate(atlas_http_server_requests_slow_total[5m])) > 0.5
            for: 10m
            labels:
                severity: warning
            annotations:
                summary: Atlas slow request rate is elevated
                description: '{{ $labels.application }} is serving more than 0.5 slow requests per second over the last 5 minutes.'
