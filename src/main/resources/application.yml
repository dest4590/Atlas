spring:
    config:
        import: 'optional:file:.env[.properties]'

    application:
        name: Atlas

    datasource:
        url: jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:atlas}
        username: ${POSTGRES_USER:atlas_user}
        password: ${POSTGRES_PASSWORD:atlas_password}
        driver-class-name: org.postgresql.Driver

        hikari:
            maximum-pool-size: 20
            minimum-idle: 5

    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true

    jackson:
        serialization:
            fail-on-empty-beans: false

    data:
        redis:
            host: ${REDIS_HOST:localhost}
            port: ${REDIS_PORT:6379}
            repositories:
                enabled: false

    servlet:
        multipart:
            max-file-size: 500MB
            max-request-size: 500MB

    web:
        error:
            whitelabel:
                enabled: true

            include-stacktrace: never

    thymeleaf:
        check-template-location: false

    mail:
        host: ${MAIL_HOST:}
        port: ${MAIL_PORT:465}
        username: ${MAIL_USERNAME:}
        password: ${MAIL_PASSWORD:}
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: false
                    ssl:
                        enable: true
                transport:
                    protocol: smtps
        default-encoding: UTF-8

logging:
    level:
        root: INFO
        org.springframework.web: WARN
        org.hibernate: WARN

server:
    compression:
        enabled: true
        mime-types: application/json,application/xml,text/html,text/plain
        min-response-size: 1024

    tomcat:
        connection-timeout: 60000
        keep-alive-timeout: 60000
        max-keep-alive-requests: 1000

management:
    health:
        mail:
            enabled: false
    endpoints:
        web:
            exposure:
                include: 'health, info, metrics, prometheus'
    metrics:
        tags:
            application: ${spring.application.name}
        distribution:
            percentiles-histogram:
                http.server.requests: true
                atlas.http.server.request.duration: true
            slo:
                http.server.requests: 100ms, 250ms, 500ms, 1s, 2s, 5s
                atlas.http.server.request.duration: 100ms, 250ms, 500ms, 1s, 2s, 5s
            maximum-expected-value:
                http.server.requests: 10s
                atlas.http.server.request.duration: 10s

jwt:
    secret: ${JWT_SECRET:default_jwt_secret_key_32bytes!x}

atlas:
    app-url: ${APP_URL:http://localhost:8080}
    monitoring:
        infrastructure-check-interval-ms: ${ATLAS_MONITORING_INFRASTRUCTURE_CHECK_INTERVAL_MS:15000}
        business-check-interval-ms: ${ATLAS_MONITORING_BUSINESS_CHECK_INTERVAL_MS:60000}
        request-slow-threshold-ms: ${ATLAS_MONITORING_REQUEST_SLOW_THRESHOLD_MS:1000}
        prometheus:
            username: ${ATLAS_PROMETHEUS_USERNAME:atlas-prometheus}
            password: ${ATLAS_PROMETHEUS_PASSWORD:atlas-prometheus-change-me}
        database:
            latency-spike-threshold-ms: ${ATLAS_MONITORING_DATABASE_SPIKE_THRESHOLD_MS:250}
        redis:
            latency-spike-threshold-ms: ${ATLAS_MONITORING_REDIS_SPIKE_THRESHOLD_MS:100}
    storage:
        upload-dir: ${APP_UPLOAD_DIR:uploads}
        temp-dir: temp
        trash-dir: .trash
        trash-retention-days: 30
    backup:
        s3:
            enabled: ${S3_BACKUP_ENABLED:false}
            region: ${S3_REGION:us-east-1}
            endpoint: ${S3_ENDPOINT:}
            bucket: ${S3_BUCKET:}
            access-key: ${S3_ACCESS_KEY:}
            secret-key: ${S3_SECRET_KEY:}
            cron: ${S3_BACKUP_CRON:0 0 3 * * *} # every day at 3:00
            retention-days: ${S3_BACKUP_RETENTION_DAYS:7}
            pg-dump-path: ${PG_DUMP_PATH:pg_dump}
    crash-logs:
        retention-days: ${CRASH_LOG_RETENTION_DAYS:30}
        max-log-chars: ${CRASH_LOG_MAX_CHARS:40000}
        cleanup-cron: ${CRASH_LOG_CLEANUP_CRON:0 0 */6 * * *}

irc:
    enabled: ${IRC_ENABLED:true}
    port: ${IRC_PORT:1338}

security:
    rate-limit:
        auth:
            max-requests: ${AUTH_RATE_LIMIT_MAX_REQUESTS:10}
            window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
