global:
    scrape_interval: 15s
    evaluation_interval: 15s

rule_files:
    - /etc/prometheus/rules/*.yml

scrape_configs:
    - job_name: 'atlas-app'
      scrape_interval: 10s
      scrape_timeout: 9s
      metrics_path: '/actuator/prometheus'
      basic_auth:
          username: '__ATLAS_PROMETHEUS_USERNAME__'
          password: '__ATLAS_PROMETHEUS_PASSWORD__'
      static_configs:
          - targets: ['backend:8080']
      relabel_configs:
          - target_label: application
            replacement: 'Atlas'

    - job_name: 'prometheus'
      static_configs:
          - targets: ['prometheus:9090']
